services:
  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgres://vuln:vuln@postgres:5432/vulncrm
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: changeme
      SEED_ON_START: "true"
      BASE_URL: http://localhost:4000
      ADMIN_BOOTSTRAP_TOKEN: debug-admin
      UPLOAD_DIR: uploads
    depends_on:
      - postgres
      - redis
    volumes:
      - ./uploads:/app/uploads
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vuln
      POSTGRES_PASSWORD: vuln
      POSTGRES_DB: vulncrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  postgres_data:
